schema-version = "1.10.0"


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
go.pkg-path = "go"
tmux.pkg-path = "tmux"
mailcap.pkg-path = "mailcap"
iana-etc.pkg-path = "iana-etc"
tzdata.pkg-path = "tzdata"
tzdata.outputs = "all"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
# on-activate = '''
#   # -> Set variables, create files and directories
#   # -> Perform initialization steps, e.g. create a python venv
#   # -> Useful environment variables:
#   #      - FLOX_ENV_PROJECT=/home/user/example
#   #      - FLOX_ENV=/home/user/example/.flox/run
#   #      - FLOX_ENV_CACHE=/home/user/example/.flox/cache
# '''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
# common = '''
#   gum style \
#   --foreground 212 --border-foreground 212 --border double \
#   --align center --width 50 --margin "1 2" --padding "2 4" \
#     $INTRO_MESSAGE
# '''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
# myservice.command = "python3 -m http.server"


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


## Build and publish your own packages ------------------------------
##  $ flox build
##  $ flox publish
## ------------------------------------------------------------------
[build]

[build.agent-deck]
description = "Terminal UI for managing multiple AI agent sessions"
version.command = "git describe --tags --always 2>/dev/null || echo 0.1.0"
runtime-packages = ["go", "tmux", "mailcap", "iana-etc", "tzdata"]
command = """
  # Use cache directory for cloning (with fallback to /tmp)
  CACHE_DIR="${FLOX_ENV_CACHE:-/tmp}/agent-deck-build"

  # Clone the repository if not already present
  if [ ! -d "$CACHE_DIR" ]; then
    git clone https://github.com/asheshgoplani/agent-deck.git "$CACHE_DIR"
  fi

  cd "$CACHE_DIR"

  # Fetch latest changes
  git fetch --tags --force
  git pull origin main || true
  git checkout v0.28.3

  # Build the binary as a fully static executable
  CGO_ENABLED=0 go build -ldflags="-s -w" -o agent-deck ./cmd/agent-deck

  # Install to output directory
  mkdir -p $out/bin
  cp agent-deck $out/bin/
"""


## Other Environment Options -----------------------------------------
[options]
# Systems that environment is compatible with
# systems = [
#   "aarch64-darwin",
#   "aarch64-linux",
#   "x86_64-darwin",
